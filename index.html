<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Controle Apartamento</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- LOADING -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
  </div>

  <!-- HEADER -->
  <header class="dashboard-header">
    <h1><span class="header-dot"></span>Controle Apartamento</h1>
    <span class="header-meta" id="headerDate"></span>
  </header>

  <!-- BODY -->
  <main class="dashboard-body">

    <!-- KPI CARDS -->
    <section class="kpi-row">

      <div class="kpi-card accent-blue">
        <div class="kpi-label">Balanço Total</div>
        <div class="kpi-value negative" id="kpiBalanco" data-value="-114764.63">-R$114.764,63</div>
      </div>

      <div class="kpi-card accent-green">
        <div class="kpi-label">Recebimentos</div>
        <div class="kpi-value positive" id="kpiRecebimentos" data-value="117834.00">R$117.834,00</div>
      </div>

      <div class="kpi-card accent-amber">
        <div class="kpi-label">Gastos</div>
        <div class="kpi-value positive" id="kpiGastos" data-value="44306.13">R$44.306,13</div>
      </div>

      <div class="kpi-card accent-purple">
        <div class="kpi-label">Lucro</div>
        <div class="kpi-value positive" id="kpiLucro" data-value="73350.23">R$73.350,23</div>
      </div>

      <div class="kpi-card filter-card accent-slate">
        <div class="filter-label">Ano</div>
        <select class="filter-select" id="filterAno">
          <option value="Todos">Todos</option>
        </select>
      </div>

    </section>

    <!-- BADGES -->
    <div id="filterBadge"></div>

    <!-- GRÁFICOS -->
    <section class="charts-grid">

      <div class="left-col">

        <div class="chart-card dot-blue">
          <div class="chart-title" id="titleLucroMes">Lucro por Mês em 2026</div>
          <div class="chart-container">
            <canvas id="chartLucroMes"></canvas>
          </div>
        </div>

        <div class="chart-card dot-purple">
          <div class="chart-title">Lucro por Ano</div>
          <div class="chart-container">
            <canvas id="chartLucroAno"></canvas>
          </div>
        </div>

      </div>

      <div class="chart-card large dot-green">
        <div class="chart-title">Lucro por Ano — Visão Mensal</div>
        <div class="chart-container">
          <canvas id="chartLucroGeral"></canvas>
        </div>
      </div>

    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
